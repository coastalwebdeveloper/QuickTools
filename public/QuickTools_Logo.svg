<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tools Icons -->
  <!-- Wrench -->
  <path d="M60 70 L75 85 L70 90 L55 75 Z M75 85 L85 75 L90 80 L80 90 Z" fill="white" stroke="white" stroke-width="2"/>
  
  <!-- Screwdriver -->
  <rect x="110" y="60" width="4" height="30" fill="white" transform="rotate(45 112 75)"/>
  <rect x="108" y="58" width="8" height="8" fill="white" transform="rotate(45 112 62)"/>
  
  <!-- Gear -->
  <circle cx="130" cy="120" r="15" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="130" cy="120" r="8" fill="white"/>
  <rect x="128" y="100" width="4" height="8" fill="white"/>
  <rect x="128" y="132" width="4" height="8" fill="white"/>
  <rect x="118" y="118" width="8" height="4" fill="white"/>
  <rect x="142" y="118" width="8" height="4" fill="white"/>
  
  <!-- Calculator/Grid -->
  <rect x="50" y="110" width="25" height="30" fill="none" stroke="white" stroke-width="2" rx="3"/>
  <line x1="58" y1="110" x2="58" y2="140" stroke="white" stroke-width="1"/>
  <line x1="67" y1="110" x2="67" y2="140" stroke="white" stroke-width="1"/>
  <line x1="50" y1="120" x2="75" y2="120" stroke="white" stroke-width="1"/>
  <line x1="50" y1="130" x2="75" y2="130" stroke="white" stroke-width="1"/>
  
  <!-- Lightning bolt for "Quick" -->
  <path d="M95 45 L105 45 L100 55 L110 55 L95 75 L100 65 L90 65 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">QuickTools</text>
</svg>